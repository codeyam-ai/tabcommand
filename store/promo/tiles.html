<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#666;font-family:'IBM Plex Sans',sans-serif;display:flex;flex-direction:column;gap:30px;padding:30px;align-items:flex-start}
.t{position:relative;overflow:hidden}
.wm{font-weight:600;letter-spacing:-.5px;color:#f2f2f2;white-space:nowrap}
.wm b{color:#c7f04a;font-weight:600}

/* ---------------- SMALL 440x280 ---------------- */
#small{width:440px;height:280px;background:radial-gradient(130% 130% at 12% 8%,#1e1e1e 0%,#0b0b0b 62%);
  display:flex;flex-direction:column;justify-content:center;padding:0 40px;gap:16px}
#small .row{display:flex;align-items:center;gap:14px}
#small img{width:60px;height:60px;border-radius:14px}
#small .wm{font-size:32px}
#small .tag{font-size:15.5px;line-height:1.5;color:#a5a5a5;max-width:344px}
#small .tag em{color:#ececec;font-style:normal;font-weight:500}
#small .chips{display:flex;gap:6px;margin-top:2px}
#small .chip{height:5px;width:40px;border-radius:3px}

/* ---------------- MARQUEE 1400x560 ---------------- */
#mq{width:1400px;height:560px;background:radial-gradient(100% 140% at 8% 10%,#202020 0%,#0a0a0a 58%);
  display:flex;align-items:center}
#mq .left{width:640px;padding-left:84px;display:flex;flex-direction:column;gap:26px;flex:none}
#mq .row{display:flex;align-items:center;gap:22px}
#mq img{width:96px;height:96px;border-radius:22px}
#mq .wm{font-size:54px}
#mq .tag{font-size:25px;line-height:1.5;color:#a5a5a5;max-width:520px}
#mq .tag em{color:#f0f0f0;font-style:normal;font-weight:500}
#mq .chips{display:flex;gap:9px;margin-top:2px}
#mq .chip{height:7px;width:66px;border-radius:4px}
/* board motif */
#mq .board{flex:1;height:100%;display:flex;align-items:center;justify-content:center;gap:22px;padding-right:40px}
#mq .col{display:flex;flex-direction:column;gap:20px}
#mq .card{width:196px;border-radius:13px;background:#171717;border:1px solid rgba(255,255,255,.08);overflow:hidden;box-shadow:0 12px 34px rgba(0,0,0,.45)}
#mq .card .h{height:26px;display:flex;align-items:center;padding:0 11px;font-size:11.5px;font-weight:600;color:#fff}
#mq .card .body{padding:11px 11px 14px;display:flex;flex-direction:column;gap:8px}
#mq .card .l{height:8px;border-radius:4px;background:#2b2b2b}
#mq .card .l.s{width:62%}
#mq .card .l.m{width:84%}
</style></head><body>
